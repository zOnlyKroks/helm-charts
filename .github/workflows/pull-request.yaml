name: "Pull Request"
on:
  pull_request_target:
    types:
      - opened
      - reopened
      - synchronize
    branches:
      - main

jobs:
  lint-test-changelog:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Setup Helm
        uses: Azure/setup-helm@v4.3.1

      - name: Checkout
        uses: actions/checkout@v5.0.0
        with:
          fetch-depth: 0
          token: ${{ github.token }}
          ref: ${{ github.head_ref }}

      # Python is required because `ct lint` runs Yamale (https://github.com/23andMe/Yamale) and
      # yamllint (https://github.com/adrienverge/yamllint) which require Python
      - name: Set up Python
        uses: actions/setup-python@65d7f2d534ac1bc67fcd62888c5f4f3d2cb2b236 # v4.7.1
        with:
          python-version: 3.x

      - name: Set up chart-testing-action
        uses: helm/chart-testing-action@v2.7.0

      - name: Installing plugin helm-unittest
        run: helm plugin install https://github.com/helm-unittest/helm-unittest >/dev/null

      - name: Get changed charts and run tests
        run: |
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"

          # Debug git state
          echo "Git branches:"
          git branch -a
          echo "Git remotes:"
          git remote -v
          echo "Current HEAD:"
          git log --oneline -3
          echo "Origin/main:"
          git log --oneline -3 origin/main 2>/dev/null || echo "origin/main not found"

          # Get changed files
          CHANGED_FILES=$(git diff --name-only origin/main..HEAD 2>/dev/null || git diff --name-only HEAD~10..HEAD)
          echo "Changed files: $CHANGED_FILES"

          # Find changed charts
          CHANGED_CHARTS=$(echo "$CHANGED_FILES" | grep "^charts/" | cut -d'/' -f2 | sort -u)
          echo "Changed charts: $CHANGED_CHARTS"

          # Test changed charts
          for CHART_NAME in $CHANGED_CHARTS; do
            if [ ! -d "charts/$CHART_NAME" ] || [ ! -f "charts/$CHART_NAME/Chart.yaml" ]; then
              continue
            fi
            
            echo "Testing chart: $CHART_NAME"
            
            # Update dependencies if Chart.yaml has dependencies
            if grep -q "^dependencies:" "charts/$CHART_NAME/Chart.yaml"; then
              echo "Updating dependencies for $CHART_NAME"
              helm dependency update "charts/$CHART_NAME"
            fi
            
            helm lint "charts/$CHART_NAME"
            helm unittest "charts/$CHART_NAME" || echo "No tests found for $CHART_NAME"
            helm template "charts/$CHART_NAME" > /dev/null
          done

          # Update changelogs
          for CHART_NAME in $CHANGED_CHARTS; do
            if [ ! -d "charts/$CHART_NAME" ] || [ ! -f "charts/$CHART_NAME/Chart.yaml" ]; then
              continue
            fi
            
            echo "Updating changelog for: $CHART_NAME"
            
            # Get version and setup
            CHART_VERSION=$(yq eval '.version' "charts/$CHART_NAME/Chart.yaml")
            CHANGELOG_FILE="charts/$CHART_NAME/CHANGELOG.md"
            CURRENT_DATE=$(date +'%Y-%m-%d')
            
            # Get all commits for this chart since diverging from main
            COMMITS=$(git log origin/main..HEAD --pretty=format:"* %s ([%h](${{ github.server_url }}/${{ github.repository }}/commit/%H))" -- "charts/$CHART_NAME/")
            
            # Debug: show what commits we found
            echo "All commits found for $CHART_NAME:"
            echo "$COMMITS"
            
            if [ -z "$COMMITS" ]; then
              echo "No commits found for $CHART_NAME"
              continue
            fi
            
            echo "Commits found:"
            echo "$COMMITS"
            
            # Create/update changelog
            if [ ! -f "$CHANGELOG_FILE" ]; then
              echo "# Changelog" > "$CHANGELOG_FILE"
              echo "" >> "$CHANGELOG_FILE"
            fi
            
            # Create new changelog entry only if commits exist
            TEMP_CHANGELOG=$(mktemp)
            
            # Start with header
            echo "# Changelog" > "$TEMP_CHANGELOG"
            echo "" >> "$TEMP_CHANGELOG"
            
            # Add new version entry
            echo "## <small>$CHART_VERSION</small> ($CURRENT_DATE)" >> "$TEMP_CHANGELOG"
            echo "" >> "$TEMP_CHANGELOG"
            echo "$COMMITS" >> "$TEMP_CHANGELOG"
            echo "" >> "$TEMP_CHANGELOG"
            
            # Add existing content, but remove entries with commits from current PR
            if [ -f "$CHANGELOG_FILE" ]; then
              # Get all commit hashes from current PR 
              PR_COMMIT_HASHES=$(git log origin/main..HEAD --pretty=format:"%h" -- "charts/$CHART_NAME/")
              
              # Process changelog to remove sections containing PR commits
              TEMP_SECTION=$(mktemp)
              SECTION_TO_KEEP=""
              IN_SECTION=0
              KEEP_SECTION=1
              
              while IFS= read -r line; do
                if [[ "$line" =~ ^#[[:space:]]*Changelog ]]; then
                  continue
                elif [[ "$line" =~ ^##[[:space:]] ]]; then
                  # Start of new section - output previous section if we're keeping it
                  if [[ $IN_SECTION -eq 1 && $KEEP_SECTION -eq 1 && -n "$SECTION_TO_KEEP" ]]; then
                    echo "$SECTION_TO_KEEP" >> "$TEMP_CHANGELOG"
                  fi
                  # Reset for new section
                  IN_SECTION=1
                  KEEP_SECTION=1
                  SECTION_TO_KEEP="$line"
                elif [[ $IN_SECTION -eq 1 ]]; then
                  # We're in a section - check if this line contains a PR commit
                  if [[ "$line" =~ \[([a-f0-9]+)\] ]]; then
                    commit_hash="${BASH_REMATCH[1]}"
                    if echo "$PR_COMMIT_HASHES" | grep -q "$commit_hash"; then
                      # This section contains a commit from our PR - don't keep it
                      KEEP_SECTION=0
                      SECTION_TO_KEEP=""
                    fi
                  fi
                  
                  if [[ $KEEP_SECTION -eq 1 ]]; then
                    SECTION_TO_KEEP="$SECTION_TO_KEEP"$'\n'"$line"
                  fi
                fi
              done < "$CHANGELOG_FILE"
              
              # Output final section if keeping it
              if [[ $IN_SECTION -eq 1 && $KEEP_SECTION -eq 1 && -n "$SECTION_TO_KEEP" ]]; then
                echo "$SECTION_TO_KEEP" >> "$TEMP_CHANGELOG"
              fi
            fi
            
            mv "$TEMP_CHANGELOG" "$CHANGELOG_FILE"
            
            # Commit if changed
            if ! git diff --quiet "$CHANGELOG_FILE"; then
              git add "$CHANGELOG_FILE"
              git commit -m "Update $CHART_NAME changelog"
            fi
          done

          # Push if there are commits
          CURRENT_BRANCH=$(git branch --show-current)
          if [ -n "$(git log origin/$CURRENT_BRANCH..HEAD 2>/dev/null)" ]; then
            git push origin $CURRENT_BRANCH
          fi
