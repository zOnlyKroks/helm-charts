name: "Pull Request"
on:
  pull_request_target:
    types:
      - opened
      - reopened
      - synchronize
    branches:
      - main

jobs:
  lint-test-changelog:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: read
    steps:
      - name: Setup Helm
        uses: Azure/setup-helm@v4.3.1

      - name: Checkout PR branch
        uses: actions/checkout@v5.0.0
        with:
          path: charts
          fetch-depth: 0
          token: ${{ github.token }}
          ref: ${{ github.head_ref }}

      - name: Checkout upstream main branch
        uses: actions/checkout@v5.0.0
        with:
          path: upstream-charts
          fetch-depth: 0
          token: ${{ github.token }}
          ref: main

      # Python is required because `ct lint` runs Yamale (https://github.com/23andMe/Yamale) and
      # yamllint (https://github.com/adrienverge/yamllint) which require Python
      - name: Set up Python
        uses: actions/setup-python@65d7f2d534ac1bc67fcd62888c5f4f3d2cb2b236 # v4.7.1
        with:
          python-version: 3.x

      - name: Set up chart-testing-action
        uses: helm/chart-testing-action@v2.7.0

      - name: Set up Node.js for changelog generation
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Installing plugin helm-unittest
        run: helm plugin install https://github.com/helm-unittest/helm-unittest >/dev/null

      - name: Get changed charts and run tests
        working-directory: charts
        run: |
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"

          # Debug git state
          echo "Git branches:"
          git branch -a
          echo "Git remotes:"
          git remote -v
          echo "Current HEAD:"
          git log --oneline -3
          echo "Origin/main:"
          git log --oneline -3 origin/main 2>/dev/null || echo "origin/main not found"

          # Get changed files by comparing with upstream
          CHANGED_FILES=$(git diff --name-only origin/main..HEAD 2>/dev/null || git diff --name-only HEAD~10..HEAD)
          echo "Changed files: $CHANGED_FILES"

          # Find changed charts
          CHANGED_CHARTS=$(echo "$CHANGED_FILES" | grep "^charts/" | cut -d'/' -f2 | sort -u)
          echo "Changed charts: $CHANGED_CHARTS"

          # Test changed charts
          for CHART_NAME in $CHANGED_CHARTS; do
            if [ ! -d "charts/$CHART_NAME" ] || [ ! -f "charts/$CHART_NAME/Chart.yaml" ]; then
              continue
            fi
            
            echo "Testing chart: $CHART_NAME"
            
            # Update dependencies if Chart.yaml has dependencies
            if grep -q "^dependencies:" "charts/$CHART_NAME/Chart.yaml"; then
              echo "Updating dependencies for $CHART_NAME"
              helm dependency update "charts/$CHART_NAME"
            fi
            
            helm lint "charts/$CHART_NAME"
            helm unittest "charts/$CHART_NAME" || echo "No tests found for $CHART_NAME"
            helm template "charts/$CHART_NAME" > /dev/null
          done

      - name: Generate changelog for changed charts
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          cd charts
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"

          # Install conventional-changelog-cli
          npm install -g conventional-changelog-cli

          # Get PR information
          PR_TITLE=$(gh api repos/${{ github.repository }}/pulls/${{ github.event.number }} --jq '.title')
          PR_URL="${{ github.server_url }}/${{ github.repository }}/pull/${{ github.event.number }}"
          echo "PR Title: $PR_TITLE"
          echo "PR URL: $PR_URL"

          # Get changed files by comparing with upstream
          CHANGED_FILES=$(git diff --name-only origin/main..HEAD)
          CHANGED_CHARTS=$(echo "$CHANGED_FILES" | grep "^charts/" | cut -d'/' -f2 | sort -u)

          # Debug: Show current directory structure
          echo "Current working directory: $(pwd)"
          echo "Contents of current directory:"
          ls -la
          echo "Contents of charts directory (if it exists):"
          ls -la charts/ || echo "No charts/ directory found"

          for CHART_NAME in $CHANGED_CHARTS; do
            echo "Processing chart: $CHART_NAME"
            echo "Checking for charts/$CHART_NAME directory..."
            if [ ! -d "charts/$CHART_NAME" ] || [ ! -f "charts/$CHART_NAME/Chart.yaml" ]; then
              echo "Skipping $CHART_NAME - directory or Chart.yaml not found"
              continue
            fi
            
            echo "Generating changelog for: $CHART_NAME"
            
            CHART_DIR="charts/$CHART_NAME"
            CHANGELOG_FILE="$CHART_DIR/CHANGELOG.md"
            
            # Get current version from Chart.yaml
            CURRENT_VERSION=$(yq eval '.version' "$CHART_DIR/Chart.yaml")
            echo "Current version: $CURRENT_VERSION"
            
            # Create or backup existing changelog
            if [ ! -f "$CHANGELOG_FILE" ]; then
              echo "Creating new changelog for $CHART_NAME"
              touch "$CHANGELOG_FILE"
            else
              echo "Updating existing changelog for $CHART_NAME"
            fi
            
            # Get all commits for this chart from the PR, excluding changelog commits and merge commits
            # We are already in the git repository root, no need to change directory
            echo "Getting commits for chart from directory: $(pwd)"
            PR_COMMITS=$(git log origin/main..HEAD \
              --pretty=format:"- %s ([%h](${{ github.server_url }}/${{ github.repository }}/commit/%H))" \
              --grep="Update.*changelog" --invert-grep \
              --no-merges \
              -- "$CHART_DIR/")
            
            echo "PR commits found:"
            echo "$PR_COMMITS"
            
            # Create new changelog entry
            CURRENT_DATE=$(date +'%Y-%m-%d')
            VERSION_HEADER="## [$CURRENT_VERSION] - $CURRENT_DATE"
            
            # Create temporary file with new version entry
            TEMP_CHANGELOG=$(mktemp)
            {
              echo "# Changelog"
              echo ""
              echo "All notable changes to this project will be documented in this file."
              echo ""
              echo "$VERSION_HEADER"
              echo ""
              echo "### Changed"
              echo ""
              if [ -n "$PR_COMMITS" ]; then
                echo "$PR_COMMITS"
              else
                echo "- $PR_TITLE ([#${{ github.event.number }}]($PR_URL))"
              fi
              echo ""
            } > "$TEMP_CHANGELOG"
            
            # Add existing content, but remove any previous entries for the same version
            # and any entries that contain commits from this PR
            if [ -f "$CHART_DIR/CHANGELOG.md" ]; then
              echo "Processing existing changelog..."
              
              # Get all PR commit hashes for filtering
              PR_COMMIT_HASHES=$(git log origin/main..HEAD --pretty=format:"%h" -- "$CHART_DIR/")
              
              # Use awk to filter out sections containing PR commits
              awk -v pr_hashes="$PR_COMMIT_HASHES" -v current_version="$CURRENT_VERSION" '
                BEGIN { 
                  in_section = 0
                  keep_section = 1
                  section_buffer = ""
                  # Convert PR hashes to lookup array
                  split(pr_hashes, hash_array, "\n")
                  for (i in hash_array) {
                    if (hash_array[i] != "") {
                      pr_hash_lookup[hash_array[i]] = 1
                    }
                  }
                }
                
                /^# Changelog/ { next }
                /^All notable changes/ { next }
                /^$/ && in_section == 0 { next }
                
                /^## \[/ {
                  # Output previous section if we kept it
                  if (in_section == 1 && keep_section == 1 && section_buffer != "") {
                    print section_buffer
                  }
                  
                  # Check if this is the same version we are adding
                  if (match($0, /## \[([^\]]+)\]/, arr) && arr[1] == current_version) {
                    # Skip this version - we are replacing it
                    in_section = 1
                    keep_section = 0
                    section_buffer = ""
                    next
                  }
                  
                  # Start new section
                  in_section = 1
                  keep_section = 1
                  section_buffer = $0
                  next
                }
                
                in_section == 1 {
                  # Check if this line contains a PR commit hash
                  if (match($0, /\[([a-f0-9]+)\]/, arr)) {
                    commit_hash = arr[1]
                    if (commit_hash in pr_hash_lookup) {
                      keep_section = 0
                      section_buffer = ""
                    }
                  }
                  
                  if (keep_section == 1) {
                    section_buffer = section_buffer "\n" $0
                  }
                }
                
                END {
                  # Output final section if keeping it
                  if (in_section == 1 && keep_section == 1 && section_buffer != "") {
                    print section_buffer
                  }
                }
              ' "$CHART_DIR/CHANGELOG.md" >> "$TEMP_CHANGELOG"
            fi
            
            # Replace original changelog
            mv "$TEMP_CHANGELOG" "$CHART_DIR/CHANGELOG.md"
            
            echo "Generated changelog for $CHART_NAME:"
            head -20 "$CHART_DIR/CHANGELOG.md"
            
            # Return to charts root
            cd ../..
            
            # Commit changes if CHANGELOG.md was modified
            if ! git diff --quiet "$CHANGELOG_FILE"; then
              git add "$CHANGELOG_FILE"
              git commit -m "Update $CHART_NAME changelog" --signoff
              echo "Committed changelog update for $CHART_NAME"
            else
              echo "No changes to commit for $CHART_NAME"
            fi
          done

          # Push changes
          if [ -n "$(git log origin/${{ github.head_ref }}..HEAD 2>/dev/null)" ]; then
            echo "Pushing changelog updates..."
            git push origin ${{ github.head_ref }}
          else
            echo "No changelog changes to push"
          fi
