name: "Pull Request"
on:
  pull_request_target:
    types:
      - opened
      - reopened
      - synchronize
    branches:
      - main

jobs:
  lint-test-changelog:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: read
    steps:
      - name: Setup Helm
        uses: Azure/setup-helm@v4.3.1

      - name: Checkout PR branch
        uses: actions/checkout@v5.0.0
        with:
          path: charts
          fetch-depth: 0
          token: ${{ github.token }}
          ref: ${{ github.head_ref }}

      - name: Checkout upstream main branch
        uses: actions/checkout@v5.0.0
        with:
          path: upstream-charts
          fetch-depth: 0
          token: ${{ github.token }}
          ref: main

      # Python is required because `ct lint` runs Yamale (https://github.com/23andMe/Yamale) and
      # yamllint (https://github.com/adrienverge/yamllint) which require Python
      - name: Set up Python
        uses: actions/setup-python@65d7f2d534ac1bc67fcd62888c5f4f3d2cb2b236 # v4.7.1
        with:
          python-version: 3.x

      - name: Set up chart-testing-action
        uses: helm/chart-testing-action@v2.7.0

      - name: Set up Node.js for changelog generation
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Installing plugin helm-unittest
        run: helm plugin install https://github.com/helm-unittest/helm-unittest >/dev/null

      - name: Get changed charts and run tests
        working-directory: charts
        run: |
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"

          # Debug git state
          echo "Git branches:"
          git branch -a
          echo "Git remotes:"
          git remote -v
          echo "Current HEAD:"
          git log --oneline -3
          echo "Origin/main:"
          git log --oneline -3 origin/main 2>/dev/null || echo "origin/main not found"

          # Get changed files by comparing with upstream
          CHANGED_FILES=$(git diff --name-only origin/main..HEAD 2>/dev/null || git diff --name-only HEAD~10..HEAD)
          echo "Changed files: $CHANGED_FILES"

          # Find changed charts
          CHANGED_CHARTS=$(echo "$CHANGED_FILES" | grep "^charts/" | cut -d'/' -f2 | sort -u)
          echo "Changed charts: $CHANGED_CHARTS"

          # Test changed charts
          for CHART_NAME in $CHANGED_CHARTS; do
            if [ ! -d "charts/$CHART_NAME" ] || [ ! -f "charts/$CHART_NAME/Chart.yaml" ]; then
              continue
            fi
            
            echo "Testing chart: $CHART_NAME"
            
            # Update dependencies if Chart.yaml has dependencies
            if grep -q "^dependencies:" "charts/$CHART_NAME/Chart.yaml"; then
              echo "Updating dependencies for $CHART_NAME"
              helm dependency update "charts/$CHART_NAME"
            fi
            
            helm lint "charts/$CHART_NAME"
            helm unittest "charts/$CHART_NAME" || echo "No tests found for $CHART_NAME"
            helm template "charts/$CHART_NAME" > /dev/null
          done

      - name: Generate changelog for changed charts
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          cd charts
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"

          # Install conventional-changelog-cli
          npm install -g conventional-changelog-cli

          # Get PR information
          PR_TITLE=$(gh api repos/${{ github.repository }}/pulls/${{ github.event.number }} --jq '.title')
          PR_URL="${{ github.server_url }}/${{ github.repository }}/pull/${{ github.event.number }}"
          echo "PR Title: $PR_TITLE"
          echo "PR URL: $PR_URL"

          # Get changed files by comparing with upstream
          CHANGED_FILES=$(git diff --name-only origin/main..HEAD)
          CHANGED_CHARTS=$(echo "$CHANGED_FILES" | grep "^charts/" | cut -d'/' -f2 | sort -u)

          for CHART_NAME in $CHANGED_CHARTS; do
            if [ ! -d "charts/$CHART_NAME" ] || [ ! -f "charts/$CHART_NAME/Chart.yaml" ]; then
              continue
            fi
            
            echo "Generating changelog for: $CHART_NAME"
            
            CHART_DIR="charts/$CHART_NAME"
            CHANGELOG_FILE="$CHART_DIR/CHANGELOG.md"
            
            # Get current version from Chart.yaml
            CURRENT_VERSION=$(yq eval '.version' "$CHART_DIR/Chart.yaml")
            echo "Current version: $CURRENT_VERSION"
            
            # Create or backup existing changelog
            if [ ! -f "$CHANGELOG_FILE" ]; then
              echo "Creating new changelog for $CHART_NAME"
              touch "$CHANGELOG_FILE"
            else
              echo "Updating existing changelog for $CHART_NAME"
            fi
            
            # Generate changelog using conventional-changelog-cli
            # This generates changelog for the current directory structure
            cd "$CHART_DIR"
            
            # Generate conventional changelog
            npx conventional-changelog-cli -p angular -i CHANGELOG.md -s -r 0 --commit-path "." --lernaPackage "$CHART_NAME"
            
            # Post-process the changelog
            if [ -f "CHANGELOG.md" ]; then
              # Replace short commit SHAs with full SHAs and add proper links
              sed -i.bak -E 's/\[([a-f0-9]{7})\]/[\1](${{ github.server_url }}\/${{ github.repository }}\/commit\/\1)/g' CHANGELOG.md
              
              # Remove the "unreleased" section if it exists
              sed -i.bak '/# \[Unreleased\]/,/^$/d' CHANGELOG.md
              
              # Add new version entry if not already present
              CURRENT_DATE=$(date +'%Y-%m-%d')
              VERSION_HEADER="## [$CURRENT_VERSION] - $CURRENT_DATE"
              
              # Check if version header already exists
              if ! grep -q "## \[$CURRENT_VERSION\]" CHANGELOG.md; then
                # Create temporary file with new version entry
                {
                  echo "# Changelog"
                  echo ""
                  echo "All notable changes to this project will be documented in this file."
                  echo ""
                  echo "$VERSION_HEADER"
                  echo ""
                  echo "### Changed"
                  echo ""
                  echo "- $PR_TITLE ([#${{ github.event.number }}]($PR_URL))"
                  echo ""
                  
                  # Add existing content, skipping the first "# Changelog" line if it exists
                  if [ -s CHANGELOG.md ]; then
                    tail -n +2 CHANGELOG.md | sed '/^# Changelog$/,/^$/d'
                  fi
                } > CHANGELOG.tmp
                
                mv CHANGELOG.tmp CHANGELOG.md
              fi
              
              # Clean up backup files
              rm -f CHANGELOG.md.bak
              
              echo "Generated changelog for $CHART_NAME:"
              head -20 CHANGELOG.md
            fi
            
            # Return to charts root
            cd ../..
            
            # Commit changes if CHANGELOG.md was modified
            if ! git diff --quiet "$CHANGELOG_FILE"; then
              git add "$CHANGELOG_FILE"
              git commit -m "Update $CHART_NAME changelog

Signed-off-by: $GITHUB_ACTOR <$GITHUB_ACTOR@users.noreply.github.com>"
              echo "Committed changelog update for $CHART_NAME"
            else
              echo "No changes to commit for $CHART_NAME"
            fi
          done

          # Push changes
          if [ -n "$(git log origin/${{ github.head_ref }}..HEAD 2>/dev/null)" ]; then
            echo "Pushing changelog updates..."
            git push origin ${{ github.head_ref }}
          else
            echo "No changelog changes to push"
          fi